name: Package Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create extension package
        run: zip -r linkedin-secret-weapon.zip manifest.json background.js content.js content.css popup.html popup.js options.html options.js icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: extension-build
          path: linkedin-secret-weapon.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: linkedin-secret-weapon.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v2.0
        with:
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          file-path: ./linkedin-secret-weapon.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
